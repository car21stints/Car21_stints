<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Car21 Tyres</title>
  <style>
    :root{--bg:#111;--panel:#1d1d1d;--panel2:#181818;--line:#333;--text:#eee;--muted:#aaa;--yellow:#e6d900;--green:#54e36c;--blue:#00b7ff;--red:#ff4343;--oven:#ff9f1a}
    *{box-sizing:border-box}body{font-family:Arial,Helvetica,sans-serif;margin:0;background:var(--bg);color:var(--text)}.wrap{max-width:1280px;margin:auto;padding:18px}.top{display:flex;justify-content:space-between;gap:12px;align-items:end;flex-wrap:wrap}h1{margin:0;font-size:30px}.updated{color:var(--muted);font-size:14px}.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px;margin:18px 0}.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px}.label{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.08em}.set{font-size:38px;font-weight:800;margin:8px 0}.time{font-size:18px;color:#ddd}.sub{font-size:13px;color:#aaa;margin-top:6px}.tablewrap{overflow:auto;border-radius:14px;border:1px solid var(--line)}table{width:100%;border-collapse:collapse;background:var(--panel2);min-width:1050px}th,td{padding:10px;border-bottom:1px solid var(--line);text-align:left;white-space:nowrap}th{background:#222;color:#bbb;position:sticky;top:0;z-index:1}.gap{border-left:18px solid var(--bg)}.done{opacity:.35}.current{background:#2c2c12}.next{background:#102a18}.oven{background:#302210}.badge{display:inline-block;border-radius:999px;padding:4px 9px;font-size:12px;font-weight:700}.b-current{background:var(--yellow);color:#000}.b-next{background:var(--green);color:#000}.b-oven{background:var(--oven);color:#000}.err{background:#421d1d;border:1px solid #743333;padding:12px;border-radius:12px;margin-top:16px}.small{font-size:12px;color:#aaa}.nav{margin-top:6px}.nav a{color:#9cd8ff;text-decoration:none}.nav a:hover{text-decoration:underline}
  </style>
</head>
<body>
<div class="wrap">
  <div class="top"><div><h1>Car21 Tyres</h1><div class="nav"><a href="index.html">Pilot stint page</a></div></div><div class="updated" id="updated">Loading...</div></div>
  <div id="cards" class="cards"></div><div id="content"></div>
</div>
<script>
function toSec(t){if(!t)return null;const p=String(t).split(':').map(Number);if(p.length<2||Number.isNaN(p[0])||Number.isNaN(p[1]))return null;return p[0]*3600+p[1]*60+(p[2]||0)}
function fmt(t){return t||'-'}
function setLabel(r){if(!r)return '-';return r.set || r.set_header || '-'}
function rowTitle(r){if(!r)return '-';return `Row ${r.excel_row} | ${fmt(r.start)} - ${fmt(r.end)}`}
function classify(rows){const now=new Date();const nowSec=now.getHours()*3600+now.getMinutes()*60+now.getSeconds();let current=-1;for(let i=0;i<rows.length;i++){let s=toSec(rows[i].start), e=toSec(rows[i].end);if(s==null||e==null)continue;if(e<s)e+=86400;let n=nowSec;if(n<s-43200)n+=86400;if(n>=s&&n<e){current=i;break}}if(current<0){for(let i=0;i<rows.length;i++){let s=toSec(rows[i].start);if(s!=null&&s>=nowSec){current=i-1;break}}}return current<0?0:current}
function statusBadge(i,cur){if(i===cur)return '<span class="badge b-current">CURRENT SET</span>';if(i===cur+1)return '<span class="badge b-next">NEXT SET</span>';if(i===cur+2)return '<span class="badge b-oven">NEXT TO OVEN</span>';return ''}
async function load(){try{const res=await fetch('tyres.json?ts='+Date.now(),{cache:'no-store'});if(!res.ok)throw new Error('tyres.json non trovato');const data=await res.json();const headers=data.headers||[];const rows=data.rows||[];document.getElementById('updated').textContent='Updated: '+new Date(data.updated_at).toLocaleString();const cur=classify(rows);const current=rows[cur], next=rows[cur+1], oven=rows[cur+2];document.getElementById('cards').innerHTML=`<div class="card"><div class="label">Set gomme in uso</div><div class="set">${setLabel(current)}</div><div class="time">${rowTitle(current)}</div><div class="sub">Dati da riga Excel ${current?current.excel_row:'-'}</div></div><div class="card"><div class="label">Prossimo set da usare</div><div class="set">${setLabel(next)}</div><div class="time">${rowTitle(next)}</div><div class="sub">Preparare per il prossimo stint</div></div><div class="card"><div class="label">Prossimo set da mettere in oven</div><div class="set">${setLabel(oven)}</div><div class="time">${rowTitle(oven)}</div><div class="sub">Step successivo dopo il prossimo set</div></div>`;let head='<tr>'+headers.map((h,i)=>`<th class="${i===3?'gap':''}">${h.name}</th>`).join('')+'<th>Status</th></tr>';let body=rows.map((r,i)=>{let cls=i<cur?'done':i===cur?'current':i===cur+1?'next':i===cur+2?'oven':'';let cells=[...(r.left||[]),...(r.tyres||[])];return `<tr class="${cls}">`+cells.map((c,j)=>`<td class="${j===3?'gap':''}">${fmt(c)}</td>`).join('')+`<td>${statusBadge(i,cur)}</td></tr>`}).join('');document.getElementById('content').innerHTML=`<div class="tablewrap"><table><thead>${head}</thead><tbody>${body}</tbody></table></div><div class="small" style="margin-top:10px">Visualizzazione: colonne A, C, D + F:O dallo stesso foglio Excel. Aggiornamento automatico pagina ogni 60s; dati aggiornati dal PC ogni 5 minuti.</div>`}catch(e){document.getElementById('content').innerHTML='<div class="err">Errore caricamento dati gomme: '+e.message+'</div>'}}
load();setInterval(load,60000);
</script>
</body>
</html>
