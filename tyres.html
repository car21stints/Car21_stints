<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Car21 Tyre Preparation</title>
  <style>
    :root{
      --bg:#0f0f10;--panel:#1c1d1f;--panel2:#17181a;--line:#34363a;--text:#f1f1f1;--muted:#a7a7a7;
      --yellow:#f0df38;--green:#54e36c;--blue:#00b7ff;--red:#ff3b3b;--red2:#5b1515;--orange:#ff9f1a;
    }
    *{box-sizing:border-box}body{font-family:Arial,Helvetica,sans-serif;margin:0;background:var(--bg);color:var(--text)}
    .wrap{max-width:1450px;margin:auto;padding:18px}.top{display:flex;justify-content:space-between;gap:12px;align-items:flex-end;flex-wrap:wrap}
    h1{margin:0;font-size:30px;letter-spacing:.02em}.updated{color:var(--muted);font-size:14px;text-align:right}.nav{margin-top:6px}.nav a{color:#9cd8ff;text-decoration:none}.nav a:hover{text-decoration:underline}
    .btn{border:1px solid #5e636b;background:#24272b;color:#fff;border-radius:10px;padding:9px 13px;font-weight:700;cursor:pointer;margin-left:8px}.btn:hover{background:#30343a}
    .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px;margin:18px 0}.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:0 8px 24px rgba(0,0,0,.22)}
    .label{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.08em}.set{font-size:42px;font-weight:900;margin:8px 0}.time{font-size:18px;color:#ddd}.sub{font-size:13px;color:#aaa;margin-top:6px}
    .card.current{border-color:var(--yellow)}.card.next{border-color:var(--green)}.card.oven{border-color:var(--orange)}.card.oven-alert{background:var(--red2);border-color:var(--red)}
    .tablewrap{overflow:auto;border-radius:14px;border:1px solid var(--line)}table{width:100%;border-collapse:collapse;background:var(--panel2);min-width:1120px}th,td{padding:9px 10px;border-bottom:1px solid var(--line);text-align:left;white-space:nowrap}
    th{background:#222428;color:#c8c8c8;position:sticky;top:0;z-index:1}.gap{border-left:22px solid var(--bg)}.done{opacity:.36}.current-row{background:#2c2a11}.next-row{background:#102b18}.oven-row{background:#302210}.oven-alert-row{background:var(--red2)!important;outline:2px solid var(--red);outline-offset:-2px}.right{text-align:right}.center{text-align:center}
    .badge{display:inline-block;border-radius:999px;padding:4px 9px;font-size:12px;font-weight:800}.b-current{background:var(--yellow);color:#000}.b-next{background:var(--green);color:#000}.b-oven{background:var(--orange);color:#000}.b-alert{background:var(--red);color:#fff}
    .err{background:#421d1d;border:1px solid #743333;padding:12px;border-radius:12px;margin-top:16px}.small{font-size:12px;color:#aaa;margin-top:10px;line-height:1.45}.mono{font-family:Consolas,monospace}
  </style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div>
      <h1>Car21 Tyre Preparation</h1>
      <div class="nav"><a href="index.html">Driver stint page</a></div>
    </div>
    <div class="updated"><span id="updated">Loading...</span><button class="btn" onclick="load(true)">Reload published data</button></div>
  </div>
  <div id="cards" class="cards"></div>
  <div id="content"></div>
</div>
<script>
const OVEN_WINDOW_SEC = 5 * 60;
function toSec(t){if(!t)return null;const p=String(t).trim().split(':').map(Number);if(p.length<2||Number.isNaN(p[0])||Number.isNaN(p[1]))return null;return (p[0]*3600+p[1]*60+(p[2]||0))%86400}
function secDiff(a,b){let d=a-b;if(d>43200)d-=86400;if(d<-43200)d+=86400;return d}
function nowSec(){const n=new Date();return n.getHours()*3600+n.getMinutes()*60+n.getSeconds()}
function fmt(v){return (v===undefined||v===null||v==='')?'-':v}
function tyreSet(r){return r?.tyre_set || '-'}
function ovenTime(r){return r?.in_the_hoven || ''}
function rowTitle(r){if(!r)return '-';return `Stint ${fmt(r.stint)} | ${fmt(r.start)} - ${fmt(r.end)}`}
function classifyCurrent(rows){const n=nowSec();let current=-1;for(let i=0;i<rows.length;i++){let s=toSec(rows[i].start), e=toSec(rows[i].end);if(s==null||e==null)continue;let nn=n;if(e<s)e+=86400;if(nn<s-43200)nn+=86400;if(nn>=s&&nn<e){current=i;break}}
  if(current<0){for(let i=0;i<rows.length;i++){let s=toSec(rows[i].start);if(s!=null && secDiff(s,n)>0){current=Math.max(0,i-1);break}}}
  return current<0?0:current;
}
function isOvenAlert(r){const ot=toSec(ovenTime(r));if(ot==null)return false;return Math.abs(secDiff(nowSec(),ot))<=OVEN_WINDOW_SEC}
function nextOvenRow(rows){const n=nowSec();let best=null,bestDiff=Infinity;for(const r of rows){const ot=toSec(ovenTime(r));if(ot==null)continue;let d=secDiff(ot,n);if(d>=-OVEN_WINDOW_SEC && d<bestDiff){best=r;bestDiff=d}}
  if(best)return best;
  for(const r of rows){const ot=toSec(ovenTime(r));if(ot==null)continue;let d=secDiff(ot,n);if(d>=0 && d<bestDiff){best=r;bestDiff=d}}
  return best;
}
function statusBadge(i,cur,r,ovenRow){let out=[];if(i===cur)out.push('<span class="badge b-current">CURRENT SET</span>');if(i===cur+1)out.push('<span class="badge b-next">NEXT SET</span>');if(ovenRow && r.excel_row===ovenRow.excel_row)out.push('<span class="badge b-oven">NEXT TO OVEN</span>');if(isOvenAlert(r))out.push('<span class="badge b-alert">OVEN WINDOW</span>');return out.join(' ')}
function numCell(v){return `<td class="right">${fmt(v)}</td>`}
async function load(manual=false){try{const res=await fetch('tyres.json?ts='+Date.now(),{cache:'no-store'});if(!res.ok)throw new Error('tyres.json not found');const data=await res.json();const rows=data.rows||[];document.getElementById('updated').textContent='Data updated: '+new Date(data.updated_at).toLocaleString();const cur=classifyCurrent(rows);const current=rows[cur], next=rows[cur+1], oven=nextOvenRow(rows);
    document.getElementById('cards').innerHTML=`
      <div class="card current"><div class="label">Current tyre set</div><div class="set">${tyreSet(current)}</div><div class="time">${rowTitle(current)}</div><div class="sub">Mounted: ${fmt(current?.mounted)} | Row ${fmt(current?.excel_row)}</div></div>
      <div class="card next"><div class="label">Next tyre set to use</div><div class="set">${tyreSet(next)}</div><div class="time">${rowTitle(next)}</div><div class="sub">Ready: ${fmt(next?.ready)} | Row ${fmt(next?.excel_row)}</div></div>
      <div class="card oven ${oven && isOvenAlert(oven)?'oven-alert':''}"><div class="label">Next tyre set to put in oven</div><div class="set">${tyreSet(oven)}</div><div class="time">Oven time: ${fmt(ovenTime(oven))}</div><div class="sub">Red alert from -5 min to +5 min | Row ${fmt(oven?.excel_row)}</div></div>`;
    const headers=['Stint','Start','End','Tyre set','In the oven','Mounted','Rim temp','FL','FR','RL','RR','Expected track T','Bleed','Status'];
    const head='<tr>'+headers.map((h,i)=>`<th class="${i===3?'gap':''}">${h}</th>`).join('')+'</tr>';
    const body=rows.map((r,i)=>{let cls=i<cur?'done':i===cur?'current-row':i===cur+1?'next-row':'';if(oven&&r.excel_row===oven.excel_row)cls+=' oven-row';if(isOvenAlert(r))cls+=' oven-alert-row';return `<tr class="${cls}">
      <td>${fmt(r.stint)}</td><td>${fmt(r.start)}</td><td>${fmt(r.end)}</td>
      <td class="gap"><b>${fmt(r.tyre_set)}</b></td><td>${fmt(r.in_the_hoven)}</td><td>${fmt(r.mounted)}</td><td class="right">${fmt(r.rim_temp)}</td>
      ${numCell(r.FL)}${numCell(r.FR)}${numCell(r.RL)}${numCell(r.RR)}${numCell(r.track_temp)}${numCell(r.bleed)}
      <td>${statusBadge(i,cur,r,oven)}</td></tr>`}).join('');
    document.getElementById('content').innerHTML=`<div class="tablewrap"><table><thead>${head}</thead><tbody>${body}</tbody></table></div><div class="small">Displayed columns: A, C, D, then F:O from the same Excel sheet. This page reloads the latest published data when you press <b>Reload published data</b> and automatically every 60 seconds. To force a new Excel read immediately, run <b>force_update_now.bat</b> on the pit-wall PC.</div>`;
  }catch(e){document.getElementById('content').innerHTML='<div class="err">Tyre data loading error: '+e.message+'</div>'}}
load();setInterval(()=>load(false),60000);
</script>
</body>
</html>
